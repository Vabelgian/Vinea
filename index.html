<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Vinea – Votre compagnon vin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --burgundy:   #6B1A2A;
      --burgundy-light: #8B2540;
      --gold:       #C9A96E;
      --rose:       #C97B7B;
      --sage:       #8A9E7B;
      --cream:      #F5EDE0;
      --dark:       #1A0D0D;
      --card-bg:    rgba(20, 10, 10, 0.82);
    }

    html, body {
      height: 100%;
      font-family: 'EB Garamond', Georgia, serif;
      background: var(--cream);
      overflow-x: hidden;
    }

    /* ── PHONE WRAPPER (desktop centering) ── */
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #d8c4b0;
      min-height: 100vh;
    }

    .phone {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100svh;
      overflow: hidden;
      background: var(--cream);
    }

    /* ── HERO BACKGROUND ── */
    .hero {
      position: relative;
      width: 100%;
      height: 44vh;
      min-height: 280px;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        /* warm gradient sky */
        radial-gradient(ellipse 120% 60% at 50% -10%,
          rgba(255,210,140,0.55) 0%,
          rgba(230,170,90,0.25) 40%,
          transparent 70%),
        /* vineyard hills silhouette layer */
        linear-gradient(
          180deg,
          #F2D9B0 0%,
          #E8C88A 28%,
          #BFB07A 50%,
          #8B9C6A 65%,
          #6E8550 78%,
          #93A068 88%,
          #B5BB7E 100%
        );
      animation: breathe 8s ease-in-out infinite alternate;
    }

    @keyframes breathe {
      from { filter: brightness(1); }
      to   { filter: brightness(1.05) saturate(1.08); }
    }

    /* rolling hill shapes */
    .hero-bg::before {
      content: '';
      position: absolute;
      bottom: -1px;
      left: -5%;
      width: 110%;
      height: 55%;
      background: rgba(100,120,65,0.35);
      border-radius: 80% 60% 0 0 / 60% 40% 0 0;
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 20%;
      width: 90%;
      height: 40%;
      background: rgba(80,100,50,0.28);
      border-radius: 70% 90% 0 0 / 50% 60% 0 0;
    }

    /* fade into page */
    .hero-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(to bottom, transparent, var(--cream));
      pointer-events: none;
    }

    /* ── BRANDING ── */
    .brand {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 10vh;
      gap: 6px;
      animation: fadeDown 0.9s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .grape-icon {
      width: 44px;
      height: 44px;
      color: var(--burgundy);
      filter: drop-shadow(0 2px 6px rgba(107,26,42,0.3));
    }

    .brand-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(3.2rem, 13vw, 5rem);
      font-weight: 400;
      color: var(--burgundy);
      letter-spacing: -0.01em;
      line-height: 1;
      text-shadow: 0 2px 20px rgba(107,26,42,0.15);
    }

    .brand-sub {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(0.85rem, 3.5vw, 1rem);
      font-weight: 400;
      color: #7A6A58;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    /* ── CARDS SECTION ── */
    .cards {
      position: relative;
      z-index: 3;
      padding: 8px 18px 40px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: -20px;
    }

    .card {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      height: 120px;
      cursor: pointer;
      transform: translateY(30px);
      opacity: 0;
      animation: slideUp 0.7s ease forwards;
      box-shadow:
        0 8px 32px rgba(20,8,8,0.35),
        0 2px 8px rgba(20,8,8,0.2);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:nth-child(1) { animation-delay: 0.25s; }
    .card:nth-child(2) { animation-delay: 0.4s; }
    .card:nth-child(3) { animation-delay: 0.55s; }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card:active {
      transform: scale(0.97);
      box-shadow: 0 4px 16px rgba(20,8,8,0.45);
    }

    /* photo-like atmospheric backgrounds */
    .card-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 0.5s ease;
    }
    .card:hover .card-bg { transform: scale(1.04); }

    /* card 1 – cave/cellar: dark warm bottles */
    .card-1 .card-bg {
      background:
        radial-gradient(ellipse 60% 80% at 80% 50%, rgba(120,70,20,0.6) 0%, transparent 60%),
        linear-gradient(115deg, #1A0A05 0%, #3D1E0A 35%, #6B3A18 65%, #2C1508 100%);
    }
    .card-1 .card-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        88deg,
        transparent 0px, transparent 18px,
        rgba(80,40,10,0.25) 18px, rgba(80,40,10,0.25) 22px
      );
    }

    /* card 2 – dégustations: candlelit ambiance */
    .card-2 .card-bg {
      background:
        radial-gradient(ellipse 40% 70% at 75% 40%, rgba(200,130,40,0.55) 0%, transparent 55%),
        radial-gradient(ellipse 30% 50% at 85% 60%, rgba(180,100,30,0.35) 0%, transparent 50%),
        linear-gradient(135deg, #100808 0%, #2A1208 40%, #1A0C05 70%, #0D0505 100%);
    }

    /* card 3 – atlas: vineyard landscape dusk */
    .card-3 .card-bg {
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(200,155,70,0.5) 0%, transparent 55%),
        linear-gradient(170deg, #C49A40 0%, #9B7A30 20%, #6A7A3A 45%, #3D5020 65%, #283818 85%, #1A2510 100%);
    }

    /* dark overlay for text legibility */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        100deg,
        rgba(10,5,5,0.75) 0%,
        rgba(10,5,5,0.55) 50%,
        rgba(10,5,5,0.15) 100%
      );
    }

    /* card content */
    .card-content {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      height: 100%;
      padding: 0 22px;
      gap: 18px;
    }

    .card-icon {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.15));
    }

    .card-divider {
      width: 1px;
      height: 52px;
      background: rgba(255,255,255,0.25);
      flex-shrink: 0;
    }

    .card-label {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.6rem, 6vw, 2rem);
      font-weight: 300;
      color: #fff;
      letter-spacing: 0.01em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }

    /* ── HOME INDICATOR ── */
    .home-bar {
      position: relative;
      z-index: 10;
      width: 100%;
      display: flex;
      justify-content: center;
      padding-bottom: 10px;
    }
    .home-bar span {
      display: block;
      width: 36%;
      height: 5px;
      border-radius: 3px;
      background: rgba(60,30,20,0.3);
    }

    /* ── RESPONSIVE: full-bleed on real mobile ── */
    @media (max-width: 430px) {
      body { background: var(--cream); }
      .phone { max-width: 100%; }
    }
  </style>
</head>
<body>
<div class="phone">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-fade"></div>

    <!-- Branding -->
    <div class="brand">
      <!-- Grape SVG icon -->
      <svg class="grape-icon" viewBox="0 0 48 54" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- stem -->
        <path d="M24 3 C24 3, 20 7, 26 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
        <!-- grapes cluster -->
        <circle cx="24" cy="16" r="5.5" fill="currentColor" opacity="0.9"/>
        <circle cx="17" cy="22" r="5.5" fill="currentColor" opacity="0.85"/>
        <circle cx="31" cy="22" r="5.5" fill="currentColor" opacity="0.85"/>
        <circle cx="24" cy="28" r="5.5" fill="currentColor" opacity="0.8"/>
        <circle cx="11" cy="29" r="4.8" fill="currentColor" opacity="0.75"/>
        <circle cx="37" cy="29" r="4.8" fill="currentColor" opacity="0.75"/>
        <circle cx="17.5" cy="35" r="5" fill="currentColor" opacity="0.8"/>
        <circle cx="30.5" cy="35" r="5" fill="currentColor" opacity="0.8"/>
        <circle cx="24" cy="41" r="5" fill="currentColor" opacity="0.75"/>
      </svg>

      <span class="brand-name">Vinea</span>
      <span class="brand-sub">Votre compagnon vin</span>
    </div>
  </div>

  <!-- CARDS -->
  <div class="cards">

    <!-- Ma cave -->
    <a href="cave.html" class="card card-1">
      <div class="card-bg"></div>
      <div class="card-overlay"></div>
      <div class="card-content">
        <!-- Wine crate / bottles icon -->
        <svg class="card-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="28" width="36" height="12" rx="2.5" stroke="#C9A96E" stroke-width="1.8"/>
          <line x1="4" y1="34" x2="40" y2="34" stroke="#C9A96E" stroke-width="1.4"/>
          <line x1="16" y1="28" x2="16" y2="40" stroke="#C9A96E" stroke-width="1.4"/>
          <line x1="28" y1="28" x2="28" y2="40" stroke="#C9A96E" stroke-width="1.4"/>
          <!-- bottle -->
          <path d="M19 26 C19 23 20 21 21 19 L21 10 C21 9 22 8.5 22 8.5 C22 8.5 23 9 23 10 L23 19 C24 21 25 23 25 26"
            stroke="#C9A96E" stroke-width="1.8" stroke-linecap="round" fill="none"/>
          <rect x="20.5" y="7" width="3" height="3" rx="1" fill="#C9A96E"/>
        </svg>
        <div class="card-divider"></div>
        <span class="card-label">Ma cave</span>
      </div>
    </div>

    <!-- Dégustations -->
    <a href="degustation.html" class="card card-2">
      <div class="card-bg"></div>
      <div class="card-overlay"></div>
      <div class="card-content">
        <!-- Wine glass icon -->
        <svg class="card-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 6 C12 6, 10 16, 14 22 C16 25, 20 26, 22 26 C24 26, 28 25, 30 22 C34 16, 32 6, 32 6 Z"
            stroke="#C97B7B" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
          <path d="M14 18 C14 18, 20 26, 22 26" stroke="#C97B7B" stroke-width="1.2" opacity="0.5"/>
          <line x1="22" y1="26" x2="22" y2="37" stroke="#C97B7B" stroke-width="1.8"/>
          <line x1="15" y1="37" x2="29" y2="37" stroke="#C97B7B" stroke-width="1.8" stroke-linecap="round"/>
          <!-- wine fill hint -->
          <path d="M14.5 15 C14.5 15, 16 20, 22 21.5 C28 20, 29.5 15, 29.5 15"
            fill="rgba(180,50,50,0.25)" stroke="none"/>
        </svg>
        <div class="card-divider"></div>
        <span class="card-label">Dégustations</span>
      </div>
    </div>

    <!-- Atlas -->
    <a href="atlas.html" class="card card-3">
      <div class="card-bg"></div>
      <div class="card-overlay"></div>
      <div class="card-content">
        <!-- Globe / atlas icon -->
        <svg class="card-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="22" cy="22" r="16" stroke="#8A9E7B" stroke-width="1.8"/>
          <ellipse cx="22" cy="22" rx="7" ry="16" stroke="#8A9E7B" stroke-width="1.4"/>
          <line x1="6" y1="22" x2="38" y2="22" stroke="#8A9E7B" stroke-width="1.4"/>
          <path d="M8 14 Q22 18 36 14" stroke="#8A9E7B" stroke-width="1.2" fill="none"/>
          <path d="M8 30 Q22 26 36 30" stroke="#8A9E7B" stroke-width="1.2" fill="none"/>
        </svg>
        <div class="card-divider"></div>
        <span class="card-label">Atlas</span>
      </div>
    </div>

  </div>

  <!-- HOME INDICATOR -->
  <div class="home-bar"><span></span></div>

</div>
</body>
</html>
